<!DOCTYPE html>
<html>
<body>
    <button onclick="navigator.serviceWorker.register('sw.js')">Register Worker</button>
    <button onclick="requestPerm()">Enable Notifications</button>

    <script>
        function requestPerm() { Notification.requestPermission(); }

        // Connect to the service worker
        navigator.serviceWorker.register('sw.js');

        const channel = new BroadcastChannel('game_notifications');
        channel.onmessage = async (event) => {
            const registration = await navigator.serviceWorker.getRegistration();
            if (registration) {
                // Pass the message to the Service Worker
                registration.active.postMessage(event.data);
            }
        };
    </script>
</body>
</html>
