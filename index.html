<!DOCTYPE html>
<html>
<body>
    <button id="notifyBtn">Trigger Real Notification</button>

    <script>
      // This is the "API" call you make from your game
const channel = new BroadcastChannel('game_notifications');

// Whenever your game triggers an event, just call this:
function sendNotification(msg) {
  channel.postMessage(msg);
}

// Example usage:
sendNotification("You just leveled up!");
        
        document.getElementById('notifyBtn').onclick = async () => {
            // Request permission
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                // This triggers the real system notification
                new Notification("System Alert", {
                    body: "This is a real notification from your browser!",
                    icon: 'https://cdn-icons-png.flaticon.com/512/1827/1827361.png'
                });
            } else {
                alert("Permission denied");
            }
        };
    </script>
    
    
</body>
</html>
