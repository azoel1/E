<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notification Receiver</title>
</head>
<body>
    <h1>Notification Receiver Ready</h1>
    <button onclick="requestPerm()">Enable Notifications</button>

    <script>
        // 1. Function to request permission (Must be called by a user click)
        function requestPerm() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    alert("Permissions granted!");
                }
            });
        }

        // 2. The BroadcastChannel listener (The "API" part)
        const channel = new BroadcastChannel('game_notifications');

        channel.onmessage = (event) => {
            if (Notification.permission === 'granted') {
                new Notification("Game Alert!", { 
                    body: event.data,
                    requireInteraction: true // Forces the notification to stay until swiped
                });
            } else {
                console.log("Permission not granted.");
            }
        };
    </script>
</body>
</html>
